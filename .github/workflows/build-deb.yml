name: Auto Build PHP 5.6 DEB Package
# 推送到main分支、打Tag时自动触发，也可手动触发
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      # 拉取当前仓库的打包配置
      - name: Checkout repository
        uses: actions/checkout@v4

      # 构建打包用的Docker镜像（包含所有依赖和源码）
      - name: Build Docker builder image
        run: docker build . -t php56-deb-builder:latest

      # 创建输出目录，从容器中导出打好的DEB包
      - name: Extract built DEB package
        run: |
          mkdir -p ./deb-output
          docker run --rm -v $(pwd)/deb-output:/build-output php56-deb-builder \
            /bin/bash -c "cd /build/php-5.6.40 && dpkg-buildpackage -us -uc -b && cp /build/*.deb /build-output"

      # 把DEB包作为构建产物保存，可在GitHub下载
      - name: Upload DEB package to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: php5.6-deb-package
          path: deb-output/*.deb
          retention-days: 30
