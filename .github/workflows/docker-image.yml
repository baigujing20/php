name: Build PHP5.6 DEB

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 新增：安装Docker环境，解决CI环境无Docker的问题
      - name: Install Docker
        run: |
          curl -fsSL https://get.docker.com -o get-docker.sh
          sudo sh get-docker.sh
          docker version

      - name: Build Docker image
        run: docker build -t php56-deb-builder .

      - name: Export DEB package
        run: |
          container_id=$(docker create php56-deb-builder)
          docker cp $container_id:/build/php5.6-5.6.40/debian/php5.6_*.deb ./php-5.6.40.deb
          docker rm $container_id

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-5.6.40-deb
          path: php-5.6.40.deb
