name: Build PHP5.6 DEB Package

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 支持手动触发构建

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t php56-deb-builder .

      - name: Run build in container
        run: |
          docker run --name php56-builder php56-deb-builder bash -c \
            "cd /build/php5.6-5.6.40 && dpkg-buildpackage -us -uc -b"

      - name: Copy DEB package from container
        run: docker cp php56-builder:/build/php5.6_5.6.40_amd64.deb ./php5.6_5.6.40_amd64.deb

      - name: Upload DEB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: php5.6-deb
          path: php5.6_5.6.40_amd64.deb
          retention-days: 30
